<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="2">ARCHITECTURE</text>
  <text x="480" y="60" text-anchor="middle" fill="#e4e4e7" font-size="18" font-weight="700">5-Agent Cascade Pipeline</text>

  <!-- User / Trigger -->
  <rect x="30" y="100" width="120" height="56" rx="10" fill="#1e1e2a" stroke="#3f3f5a" stroke-width="1"/>
  <text x="90" y="124" text-anchor="middle" fill="#a1a1aa" font-size="9" font-weight="600" letter-spacing="1">TRIGGER</text>
  <text x="90" y="142" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">FastAPI</text>

  <!-- Arrow: Trigger → Band -->
  <line x1="150" y1="128" x2="190" y2="128" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/></marker></defs>

  <!-- Band SDK box -->
  <rect x="190" y="90" width="140" height="76" rx="12" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="118" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700" letter-spacing="1.5">BAND SDK</text>
  <text x="260" y="136" text-anchor="middle" fill="#c4b5fd" font-size="10">Room Creation</text>
  <text x="260" y="150" text-anchor="middle" fill="#c4b5fd" font-size="10">@mention Routing</text>

  <!-- Cascade agents -->
  <!-- Agent 1: Monitor -->
  <rect x="190" y="210" width="110" height="64" rx="10" fill="#1e1e2a" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="206" cy="230" r="4" fill="#f59e0b"/>
  <text x="220" y="234" fill="#fbbf24" font-size="10" font-weight="700">Monitor</text>
  <text x="245" y="254" text-anchor="middle" fill="#a1a1aa" font-size="8">Urgency tagging</text>
  <text x="245" y="266" text-anchor="middle" fill="#71717a" font-size="8">GPT-4o-mini</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="242" x2="330" y2="242" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker></defs>

  <!-- Agent 2: Legal Parser -->
  <rect x="330" y="210" width="110" height="64" rx="10" fill="#1e1e2a" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="346" cy="230" r="4" fill="#6366f1"/>
  <text x="360" y="234" fill="#818cf8" font-size="10" font-weight="700">Legal Parser</text>
  <text x="385" y="254" text-anchor="middle" fill="#a1a1aa" font-size="8">Requirement extraction</text>
  <text x="385" y="266" text-anchor="middle" fill="#71717a" font-size="8">Claude Sonnet</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="242" x2="470" y2="242" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Agent 3: Impact Mapper -->
  <rect x="470" y="210" width="110" height="64" rx="10" fill="#1e1e2a" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="486" cy="230" r="4" fill="#10b981"/>
  <text x="500" y="234" fill="#34d399" font-size="10" font-weight="700">Impact Mapper</text>
  <text x="525" y="254" text-anchor="middle" fill="#a1a1aa" font-size="8">RAG process mapping</text>
  <text x="525" y="266" text-anchor="middle" fill="#71717a" font-size="8">Claude Sonnet</text>

  <!-- Arrow 3→4 -->
  <line x1="580" y1="242" x2="610" y2="242" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <defs><marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker></defs>

  <!-- Agent 4: Gap Analyst -->
  <rect x="610" y="210" width="110" height="64" rx="10" fill="#1e1e2a" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="626" cy="230" r="4" fill="#ef4444"/>
  <text x="640" y="234" fill="#f87171" font-size="10" font-weight="700">Gap Analyst</text>
  <text x="665" y="254" text-anchor="middle" fill="#a1a1aa" font-size="8">Compliance gaps</text>
  <text x="665" y="266" text-anchor="middle" fill="#71717a" font-size="8">Claude Sonnet</text>

  <!-- Arrow 4→5 -->
  <line x1="720" y1="242" x2="750" y2="242" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <defs><marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker></defs>

  <!-- Agent 5: Remediation Planner -->
  <rect x="750" y="210" width="120" height="64" rx="10" fill="#1e1e2a" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="766" cy="230" r="4" fill="#ec4899"/>
  <text x="780" y="234" fill="#f472b6" font-size="10" font-weight="700">Planner</text>
  <text x="810" y="254" text-anchor="middle" fill="#a1a1aa" font-size="8">Ticket generation</text>
  <text x="810" y="266" text-anchor="middle" fill="#71717a" font-size="8">Claude Sonnet</text>

  <!-- Qdrant (RAG) -->
  <rect x="440" y="330" width="140" height="50" rx="10" fill="#0f2a1f" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="510" y="352" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Qdrant Cloud</text>
  <text x="510" y="368" text-anchor="middle" fill="#6ee7b7" font-size="8">Vector DB + RAG Retrieval</text>

  <!-- Arrow: Impact Mapper ↔ Qdrant -->
  <line x1="525" y1="274" x2="525" y2="330" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
  <polygon points="525,330 521,322 529,322" fill="#10b981"/>

  <!-- HITL Gate -->
  <rect x="750" y="330" width="120" height="50" rx="10" fill="#2a1a2a" stroke="#ec4899" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="810" y="352" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="600">HITL Gate</text>
  <text x="810" y="368" text-anchor="middle" fill="#d4a0d4" font-size="8">Approve / Reject</text>

  <!-- Arrow: Planner → HITL -->
  <line x1="810" y1="274" x2="810" y2="330" stroke="#ec4899" stroke-width="1" stroke-dasharray="4 2"/>
  <polygon points="810,330 806,322 814,322" fill="#ec4899"/>

  <!-- LangSmith observability bar -->
  <rect x="190" y="420" width="680" height="44" rx="10" fill="#1a1520" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="530" y="440" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">LangSmith Observability</text>
  <text x="530" y="454" text-anchor="middle" fill="#c4b5fd" font-size="8">@traceable on all agents | Full cascade tracing | Cost tracking</text>

  <!-- Dotted lines from agents to LangSmith -->
  <line x1="245" y1="274" x2="280" y2="420" stroke="#a78bfa" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="385" y1="274" x2="400" y2="420" stroke="#a78bfa" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="525" y1="274" x2="530" y2="420" stroke="#a78bfa" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="665" y1="274" x2="650" y2="420" stroke="#a78bfa" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="810" y1="274" x2="780" y2="420" stroke="#a78bfa" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- Frontend label -->
  <rect x="30" y="200" width="120" height="80" rx="10" fill="#1e1e2a" stroke="#3f3f5a" stroke-width="1"/>
  <text x="90" y="224" text-anchor="middle" fill="#a1a1aa" font-size="9" font-weight="600" letter-spacing="1">FRONTEND</text>
  <text x="90" y="242" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">React + Vite</text>
  <text x="90" y="258" text-anchor="middle" fill="#71717a" font-size="8">Dashboard</text>
  <text x="90" y="270" text-anchor="middle" fill="#71717a" font-size="8">Pipeline • Review</text>

  <!-- Arrow: Frontend → Trigger -->
  <line x1="90" y1="280" x2="90" y2="296" stroke="#3f3f5a" stroke-width="1"/>
  <line x1="90" y1="296" x2="90" y2="156" stroke="#3f3f5a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Model routing legend -->
  <rect x="30" y="340" width="160" height="90" rx="10" fill="#1a1a24" stroke="#3f3f5a" stroke-width="1"/>
  <text x="110" y="362" text-anchor="middle" fill="#a1a1aa" font-size="9" font-weight="600" letter-spacing="1">MODEL ROUTING</text>
  <circle cx="50" cy="378" r="3" fill="#f59e0b"/>
  <text x="60" y="381" fill="#a1a1aa" font-size="8">GPT-4o-mini — classification</text>
  <circle cx="50" cy="396" r="3" fill="#6366f1"/>
  <text x="60" y="399" fill="#a1a1aa" font-size="8">Claude Sonnet — reasoning</text>
  <circle cx="50" cy="414" r="3" fill="#10b981"/>
  <text x="60" y="417" fill="#a1a1aa" font-size="8">text-embedding-3 — RAG</text>
</svg>
